services:
  - type: web
    name: todos-api        
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: todos-db   
          property: host
      - key: DB_PORT
        fromDatabase:
          name: todos-db   
          property: port
      - key: DB_USER
        fromDatabase:
          name: todos-db   
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: todos-db   
          property: password
      - key: DB_DATABASE
        fromDatabase:
          name: todos-db   
          property: database
      

databases:
  - name: todos-db         
    databaseName: todos
    user: todos_user
    plan: free