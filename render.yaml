services:
  - type: web
    name: todos-api        # was: farm-connect-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: todos-db   # was: farm-connect-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: todos-db   # was: farm-connect-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: todos-db   # was: farm-connect-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: todos-db   # was: farm-connect-db
          property: password
      - key: DB_DATABASE
        fromDatabase:
          name: todos-db   # was: farm-connect-db
          property: database
      # ... rest of your env vars

databases:
  - name: todos-db         # was: farm-connect-db
    databaseName: todos
    user: todos_user
    plan: free